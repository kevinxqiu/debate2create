name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff==0.15.12
          python -m pip install -e . --no-deps
      - name: Lint
        run: ruff check .
      - name: Installed import check
        run: |
          cd /tmp
          python - <<'PY'
          import src.debate
          import utils.make_env
          import envs.hopper
          PY
      - name: Console help commands from /tmp
        run: |
          cd /tmp
          export JAX_PLATFORM_NAME=cpu
          export MUJOCO_GL=disable
          for cmd in \
            d2c-debate \
            d2c-train-xml \
            d2c-render \
            d2c-render-policy \
            d2c-baselines \
            d2c-plot
          do
            "$cmd" --help >/dev/null
          done
      - name: Syntax check
        run: python -m compileall -q src envs utils scripts baselines render.py
      - name: No-key config check
        run: |
          PYTHONPATH=src:. JAX_PLATFORM_NAME=cpu MUJOCO_GL=disable \
            python src/debate.py env=hopper debate.rounds=0 debate.enable_judges=false
      - name: Smoke tests
        run: |
          PYTHONPATH=src:. JAX_PLATFORM_NAME=cpu MUJOCO_GL=disable \
            python -m unittest discover -s tests
