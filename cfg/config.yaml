defaults:
  - _self_
  - env: hopper
  - override hydra/launcher: local
  - override hydra/output: local

hydra:
  job:
    chdir: True
  run:
    dir: .
  output_subdir: null

# LLM parameters (single source for all agents/judges)
model: gpt-5.5
temperature: 1.0
reasoning_effort: low
verbosity: low
suffix: GPT

# Generation parameters
sample: 4            # number of reward samples per design
design_sample: 8     # number of design samples per agent (thesis/synthesis)

# Standalone helper settings for `python src/parallel_train.py`.
parallel_train:
  reward_dir: null

# Debate parameters
debate:
  rounds: 5
  best_candidate_training: false
  # Pipeline variants (defaults preserve the full Debate2Create behavior)
  agent_mode: d2c            # d2c | single_agent
  enable_synthesis: true     # when false: thesis-only (no synthesis phase)
  enable_judges: true        # when false: numeric-only (no judge feedback)
  use_llm_judges: true
  use_pluralistic_judges: true  # when true, panel feedback adds four LLM judge calls per evaluated candidate
  skip_thesis_eval: true       # when true, thesis step is critique-only; training/eval happen on synthesis only

# Map each env to an RL algorithm; derive rl.algo from selected env

rl:
  seed: 0
  # Selected algorithm derives from env-specific settings below.
  algo: ${rl.envs.${env.env_name}.algo}

  # Shared parameters
  ppo_final_num_timesteps: 10_000_000
  sac_final_num_timesteps: 5_000_000

  # Global PPO defaults (envs can override any of these)
  ppo:
    num_timesteps: 5_000_000
    num_evals: 1
    episode_length: 1000
    normalize_observations: true
    action_repeat: 1
    unroll_length: 10
    num_minibatches: 32
    num_updates_per_batch: 8
    discounting: 0.97
    learning_rate: 3e-4
    entropy_cost: 1e-3
    num_envs: 2048
    batch_size: 1024
    reward_scaling: 10
    seed: 0

  # Global SAC defaults (envs can override any of these)
  sac:
    num_timesteps: 6_000_000
    num_evals: 1
    episode_length: 1000
    normalize_observations: true
    action_repeat: 1
    discounting: 0.997
    learning_rate: 6e-4
    num_envs: 256
    batch_size: 512
    reward_scaling: 30
    grad_updates_per_step: 16
    max_replay_size: 262_144
    min_replay_size: 2_048
    max_devices_per_host: 1
    seed: 1

  # Per-environment algorithm choice and fast overrides
  envs:
    ant:
      algo: ppo
      ppo:
        num_timesteps: 8_000_000
        num_evals: 1
        reward_scaling: 25
        unroll_length: 5
        num_minibatches: 8
        num_updates_per_batch: 4
        num_envs: 256
        batch_size: 512
        entropy_cost: 1e-2
        learning_rate: 3e-4
        discounting: 0.97
        action_repeat: 1
        episode_length: 450
    half_cheetah:
      algo: ppo
      ppo:
        num_timesteps: 5_000_000
        num_evals: 1
        reward_scaling: 3
        unroll_length: 15
        num_minibatches: 16
        num_updates_per_batch: 8
        num_envs: 128
        batch_size: 512
        entropy_cost: 1e-3
        learning_rate: 3e-4
        discounting: 0.95
        action_repeat: 1
        episode_length: 400
    hopper:
      algo: sac
      sac:
        num_timesteps: 400_000
        num_evals: 1
        reward_scaling: 30
        episode_length: 800
        normalize_observations: true
        action_repeat: 1
        discounting: 0.997
        learning_rate: 6e-4
        num_envs: 12
        batch_size: 48
        grad_updates_per_step: 3
        max_devices_per_host: 1
        max_replay_size: 50_000
        min_replay_size: 2_048
    walker2d:
      algo: sac
      sac:
        num_timesteps: 500_000
        num_evals: 1
        reward_scaling: 5
        episode_length: 1000
        normalize_observations: true
        action_repeat: 1
        discounting: 0.997
        learning_rate: 6e-4
        num_envs: 12
        batch_size: 48
        grad_updates_per_step: 3
        max_devices_per_host: 1
        max_replay_size: 65_536
        min_replay_size: 4_096
    swimmer:
      algo: ppo
      ppo:
        num_timesteps: 350_000
        num_evals: 1
        reward_scaling: 5
        unroll_length: 6
        num_minibatches: 8
        num_updates_per_batch: 4
        num_envs: 128
        batch_size: 128
        entropy_cost: 1e-3
        learning_rate: 3e-4
        discounting: 0.97
        action_repeat: 1
        episode_length: 600


# Weights and Biases
use_wandb: false
wandb_project: "debate2create"
